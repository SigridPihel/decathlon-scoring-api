services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: decathlon
      POSTGRES_USER: decathlon
      POSTGRES_PASSWORD: decathlon
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/decathlon